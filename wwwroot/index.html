<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AquaAI Chat</title>
    <style>
        body { font-family: Arial; background:#ece5dd; }
        #chat { max-width: 500px; margin: 20px auto; background: white; padding: 10px; border-radius: 10px; height: 400px; overflow-y: auto; }
        .msg { padding: 8px; margin: 5px; border-radius: 8px; }
        .user { background: #dcf8c6; text-align: right; }
        .bot { background: #f1f0f0; text-align: left; }
        #inputArea { max-width: 500px; margin: auto; display: flex; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Digite sua mensagem..." />
    <button onclick="send()">Enviar</button>
</div>

<script>
async function send() {
    const input = document.getElementById("msg");
    const text = input.value;

    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mensagem: text })
    });

    const data = await res.text();

    addMsg(data, "bot");
}

function addMsg(text, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
